name: PR Checks

on:
  pull_request:
    types: [opened, synchronize]
    branches: ["main", "milestone/*"]
  pull_request_review_comment:
    types: [created]
  issue_comment:
    types: [created]

jobs:
  secrets-check:
    name: Secrets Scan
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  claude-code-review:
    name: Claude Code Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 1
      - uses: oven-sh/setup-bun@v2.2.0
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this PR for:
            - Bugs and logic errors
            - Security vulnerabilities (especially command injection, secret leakage)
            - Pipeline contract compliance (JSON schemas, execution order, error handling)
            - Adherence to project conventions in CLAUDE.md
            - Test coverage

            Use the repository's CLAUDE.md for guidance on style and conventions.
            Use `gh pr comment` with your Bash tool to leave your review as a comment on the PR.
          allowed_bots: |
            dependabot[bot]
            renovate[bot]
            claude[bot]
          claude_args: '--allowed-tools "Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*)"'

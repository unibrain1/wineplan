<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Sommelier — Pick List</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:ital,wght@0,500;1,400&display=swap" rel="stylesheet">
<link rel="icon" href="favicon.ico" type="image/x-icon">
<link rel="stylesheet" href="picklist.css">
</head>
<body class="picklist-page">

<a href="index.html" class="back-link">&larr; Back to plan</a>
<h1>Cellar Pick List</h1>
<div class="subtitle" id="subtitle">Loading...</div>

<div class="week-filter" id="week-filter">
  <span class="filter-label">Show:</span>
  <button class="filter-btn" onclick="setRange(2, this)">2 weeks</button>
  <button class="filter-btn" onclick="setRange(4, this)">4 weeks</button>
  <button class="filter-btn" onclick="setRange(8, this)">8 weeks</button>
  <button class="filter-btn active" onclick="setRange(0, this)">All</button>
</div>

<table>
  <thead>
    <tr>
      <th class="check"></th>
      <th class="wk">Wk</th>
      <th class="date-col">Date</th>
      <th>Type</th>
      <th>Wine</th>
      <th>Notes</th>
      <th>Location</th>
    </tr>
  </thead>
  <tbody id="picklist-body">
  </tbody>
</table>

<div class="total" id="total"></div>

<script>
var allRows = [];
var currentRange = 0; // 0 = all

function setRange(weeks, btn) {
  currentRange = weeks;
  document.querySelectorAll('.week-filter .filter-btn').forEach(function(b) {
    b.classList.remove('active');
  });
  btn.classList.add('active');
  renderPickList();
}

function renderPickList() {
  var body = document.getElementById('picklist-body');
  body.textContent = '';
  var currentSeason = '';
  var totalBottles = 0;
  var seasonNames = { spring: 'Spring', summer: 'Summer', fall: 'Fall', winter: 'Winter' };

  var filtered = allRows;
  if (currentRange > 0) {
    var minWeek = Math.min.apply(null, allRows.filter(function(r) { return r.week; }).map(function(r) { return r.week; }));
    var maxWeek = minWeek + currentRange - 1;
    filtered = allRows.filter(function(r) { return r.week && r.week <= maxWeek; });
  }

  // Within the displayed range, skip pairing bottles that are also planned in this range
  var plannedInRange = {};
  filtered.forEach(function(r) {
    if (r.type === 'planned') plannedInRange[r.vintage + '|' + r.name] = true;
  });
  filtered = filtered.filter(function(r) {
    if (r.type === 'pairing' && plannedInRange[r.vintage + '|' + r.name]) return false;
    return true;
  });

  filtered.forEach(function(r) {
    if (r.type === 'planned' && r.season && r.season !== currentSeason) {
      currentSeason = r.season;
      var headerRow = document.createElement('tr');
      headerRow.className = 'section-header';
      var headerCell = document.createElement('td');
      headerCell.colSpan = 7;
      headerCell.textContent = seasonNames[r.season] || r.season;
      headerRow.appendChild(headerCell);
      body.appendChild(headerRow);
    }

    var tr = document.createElement('tr');
    if (r.urgent) tr.className = 'urgent-row';
    if (r.type === 'pairing') tr.className = 'pairing-row';

    var typeLabel = r.badge === 'rose' ? 'Rosé' : r.badge.charAt(0).toUpperCase() + r.badge.slice(1);

    // Checkbox
    var tdCheck = document.createElement('td');
    tdCheck.className = 'check';
    var cb = document.createElement('input');
    cb.type = 'checkbox';
    tdCheck.appendChild(cb);
    tr.appendChild(tdCheck);

    // Week
    var tdWk = document.createElement('td');
    tdWk.className = 'wk';
    tdWk.textContent = r.week || '';
    tr.appendChild(tdWk);

    // Date
    var tdDate = document.createElement('td');
    tdDate.className = 'date-col';
    tdDate.textContent = r.date || '';
    tr.appendChild(tdDate);

    // Type badge
    var tdType = document.createElement('td');
    var badgeEl = document.createElement('span');
    badgeEl.className = 'type-badge type-' + r.badge;
    badgeEl.textContent = typeLabel;
    tdType.appendChild(badgeEl);
    tr.appendChild(tdType);

    // Wine name
    var tdWine = document.createElement('td');
    tdWine.className = 'wine-col';
    if (r.type === 'pairing') {
      var pLabel = document.createElement('span');
      pLabel.className = 'pairing-label';
      pLabel.textContent = 'Pairing';
      tdWine.appendChild(pLabel);
    }
    var vSpan = document.createElement('span');
    vSpan.className = 'vintage';
    vSpan.textContent = r.vintage;
    tdWine.appendChild(vSpan);
    tdWine.appendChild(document.createTextNode(' ' + r.name));
    tr.appendChild(tdWine);

    // Notes (pairing context or occasion)
    var tdNotes = document.createElement('td');
    tdNotes.className = 'notes-col';
    tdNotes.textContent = r.notes || '';
    tr.appendChild(tdNotes);

    // Location
    var tdLoc = document.createElement('td');
    tdLoc.className = 'loc';
    tdLoc.textContent = r.location;
    tr.appendChild(tdLoc);

    body.appendChild(tr);
    totalBottles++;
  });

  document.getElementById('total').textContent = totalBottles + ' bottles' +
    (currentRange > 0 ? ' (showing ' + currentRange + ' weeks)' : ' total');
}

// Load data
Promise.all([
  fetch('plan.json').then(function(r) { return r.json(); }),
  fetch('pairing_suggestions.json').then(function(r) { return r.json(); }).catch(function() { return { suggestions: [] }; })
]).then(function(results) {
  var plan = results[0];
  var pairings = (results[1] && results[1].suggestions) || [];
  var weeks = plan.allWeeks;

  // Build planned rows
  weeks.forEach(function(w) {
    allRows.push({
      week: w.week, date: w.date, vintage: w.vintage, name: w.name,
      badge: w.badge, urgent: w.urgent, season: w.season, type: 'planned',
      location: w.location || '',
      notes: w.occasion || ''
    });
  });

  // Add all pairing suggestions (dedup happens at render time within displayed range)
  var pairingKeys = {};
  pairings.forEach(function(p) {
    if (!p.suggested_bottle) return;
    var sb = p.suggested_bottle;
    var wineKey = sb.vintage + '|' + sb.wine;

    // Skip duplicate suggestions
    if (pairingKeys[wineKey]) return;
    pairingKeys[wineKey] = true;

    // Find week
    var weekNum = '', weekDate = p.date;
    var pd = new Date(p.date + 'T12:00:00');
    for (var wi = 0; wi < weeks.length; wi++) {
      var ws = new Date(weeks[wi].date);
      var we = new Date(ws); we.setDate(we.getDate() + 6);
      if (pd >= ws && pd <= we) {
        weekNum = weeks[wi].week;
        weekDate = weeks[wi].date;
        break;
      }
    }
    if (!weekNum && weeks.length > 0) {
      weekNum = weeks[0].week;
      weekDate = weeks[0].date;
    }

    var badge = (sb.type || 'Red').toLowerCase().replace('rosé', 'rose');
    allRows.push({
      week: weekNum, date: weekDate, vintage: String(sb.vintage), name: sb.wine,
      badge: badge, urgent: false, season: '', type: 'pairing',
      location: sb.location || '',
      notes: 'Sommelier pick'
    });
  });

  // Sort: week asc, planned before pairing
  allRows.sort(function(a, b) {
    var wDiff = (a.week || 999) - (b.week || 999);
    if (wDiff !== 0) return wDiff;
    if (a.type === 'planned' && b.type === 'pairing') return -1;
    if (a.type === 'pairing' && b.type === 'planned') return 1;
    return 0;
  });

  document.getElementById('subtitle').textContent =
    allRows.length + ' bottles · Generated ' + (plan.changelog ? plan.changelog.date : 'today');

  // Default to 4 weeks
  currentRange = 4;
  document.querySelectorAll('.week-filter .filter-btn').forEach(function(b) { b.classList.remove('active'); });
  document.querySelectorAll('.week-filter .filter-btn')[1].classList.add('active');
  renderPickList();
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Sommelier</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
<link rel="icon" href="favicon.ico" type="image/x-icon">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="header-brand">
    <img src="logo.png" alt="The Sommelier" class="header-logo">
    <div class="header-text">
      <h1><em>The</em> Sommelier</h1>
      <div class="header-tagline">Drink the right bottles at the right time.</div>
      <div class="header-sub">52-week plan &nbsp;&middot;&nbsp; One bottle per week</div>
    </div>
  </div>
  <div class="stats">
    <div class="stat"><span class="stat-num" id="stat-planned">—</span><span class="stat-lbl">Bottles Planned</span></div>
    <div class="stat"><span class="stat-num" id="stat-urgent">—</span><span class="stat-lbl">Urgent / Past Peak</span></div>
    <div class="stat"><span class="stat-num" id="stat-evolution">—</span><span class="stat-lbl">Evolution Tastings</span></div>
    <div class="stat"><span class="stat-num" id="stat-pairings">—</span><span class="stat-lbl">Menu Pairings</span></div>
  </div>
</header>

<div class="year-tabs">
  <button class="year-tab active" onclick="switchYear('all', this)">All 52 Weeks</button>
  <button class="year-tab" onclick="switchYear('cal', this)">Monthly Calendar</button>
  <button class="year-tab" onclick="switchYear('changes', this)">What Changed</button>
  <a href="picklist.html" class="year-tab" style="text-decoration:none">Pick List</a>
</div>

<div class="controls" id="filter-bar">
  <button class="filter-btn active" onclick="applyFilter('all', this)">All</button>
  <div class="filter-divider"></div>
  <button class="filter-btn" id="legend-sparkling" onclick="applyFilter('sparkling', this)"></button>
  <button class="filter-btn" id="legend-rose" onclick="applyFilter('rose', this)"></button>
  <button class="filter-btn" id="legend-white" onclick="applyFilter('white', this)"></button>
  <button class="filter-btn" id="legend-red" onclick="applyFilter('red', this)"></button>
  <div class="filter-divider"></div>
  <button class="filter-btn" onclick="applyFilter('urgent', this)"><span class="dot" style="width:3px;height:14px;border-radius:2px;background:var(--urgent)"></span> Urgent</button>
  <button class="filter-btn" onclick="applyFilter('special', this)"><span class="dot" style="width:3px;height:14px;border-radius:2px;background:var(--accent)"></span> Special</button>
  <button class="filter-btn" onclick="applyFilter('evolution', this)"><span class="dot" style="width:3px;height:14px;border-radius:2px;background:var(--evolution)"></span> Evolution</button>
  <div class="filter-divider"></div>
  <button class="filter-btn" onclick="applyFilter('spring', this)">Spring</button>
  <button class="filter-btn" onclick="applyFilter('summer', this)">Summer</button>
  <button class="filter-btn" onclick="applyFilter('fall', this)">Fall</button>
  <button class="filter-btn" onclick="applyFilter('winter', this)">Winter</button>
</div>

<div id="plan-view">
  <div id="plan"></div>
</div>

<div id="calendar-view"></div>

<div id="changelog-view"></div>


<script>
let allWeeks = [];
let quarterInfo = {};
let pairingSuggestions = [];

const typeColors = { sparkling:'#29abe0', rose:'#e83e8c', white:'#c49b2a', red:'#8b3a3a' };

function occasionIcon(occasion) {
  if (!occasion) return '';
  var o = occasion.toLowerCase();
  if (o.includes('thanksgiving'))  return '🦃';
  if (o.includes('christmas'))     return '🎄';
  if (o.includes("new year"))      return '🥂';
  if (o.includes('valentine'))     return '❤️';
  if (o.includes('4th of july') || o.includes('july 4')) return '🇺🇸';
  if (o.includes('anniversary'))   return '💍';
  if (o.includes('birthday'))      return '🎂';
  return '◆';
}

// SVG wine icons — each a distinct glass silhouette
function wineIcon(badge, size) {
  size = size || 16;
  var color = typeColors[badge] || '#8b3a3a';
  if (badge === 'sparkling') {
    // Champagne flute — tall narrow glass with bubbles
    return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">' +
      '<path d="M10 2h4v2l-1 8h-2L10 4V2z" fill="'+color+'" opacity="0.25"/>' +
      '<path d="M10 2h4v2l-1 8h-2L10 4V2z" stroke="'+color+'" stroke-width="1.5" fill="none"/>' +
      '<line x1="12" y1="12" x2="12" y2="19" stroke="'+color+'" stroke-width="1.5"/>' +
      '<line x1="9" y1="19" x2="15" y2="19" stroke="'+color+'" stroke-width="1.5" stroke-linecap="round"/>' +
      '<circle cx="11.5" cy="6" r="0.7" fill="'+color+'"/>' +
      '<circle cx="12.5" cy="8" r="0.7" fill="'+color+'"/>' +
      '<circle cx="11" cy="9.5" r="0.5" fill="'+color+'"/>' +
      '</svg>';
  }
  if (badge === 'rose') {
    // Wine glass — half filled
    return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">' +
      '<path d="M7 2h10l-1.5 9a3.5 3.5 0 01-7 0L7 2z" stroke="'+color+'" stroke-width="1.5" fill="none"/>' +
      '<path d="M8.8 7h6.4l-.7 4a3.5 3.5 0 01-5 0L8.8 7z" fill="'+color+'" opacity="0.3"/>' +
      '<line x1="12" y1="14" x2="12" y2="19" stroke="'+color+'" stroke-width="1.5"/>' +
      '<line x1="9" y1="19" x2="15" y2="19" stroke="'+color+'" stroke-width="1.5" stroke-linecap="round"/>' +
      '</svg>';
  }
  if (badge === 'white') {
    // Wine glass — quarter filled (lighter pour)
    return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">' +
      '<path d="M7 2h10l-1.5 9a3.5 3.5 0 01-7 0L7 2z" stroke="'+color+'" stroke-width="1.5" fill="none"/>' +
      '<path d="M9.2 8.5h5.6l-.5 2.5a3.5 3.5 0 01-4.6 0L9.2 8.5z" fill="'+color+'" opacity="0.3"/>' +
      '<line x1="12" y1="14" x2="12" y2="19" stroke="'+color+'" stroke-width="1.5"/>' +
      '<line x1="9" y1="19" x2="15" y2="19" stroke="'+color+'" stroke-width="1.5" stroke-linecap="round"/>' +
      '</svg>';
  }
  // red — wine glass filled high
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">' +
    '<path d="M7 2h10l-1.5 9a3.5 3.5 0 01-7 0L7 2z" stroke="'+color+'" stroke-width="1.5" fill="none"/>' +
    '<path d="M8 5h8l-1 6a3.5 3.5 0 01-6 0L8 5z" fill="'+color+'" opacity="0.35"/>' +
    '<line x1="12" y1="14" x2="12" y2="19" stroke="'+color+'" stroke-width="1.5"/>' +
    '<line x1="9" y1="19" x2="15" y2="19" stroke="'+color+'" stroke-width="1.5" stroke-linecap="round"/>' +
    '</svg>';
}

function getPairingsForWeek(dateStr) {
  // dateStr is like "Mar 16, 2026" — find all menu items within this week (0-6 days after)
  var weekStart = new Date(dateStr);
  var weekEnd = new Date(weekStart);
  weekEnd.setDate(weekEnd.getDate() + 6);
  var results = [];
  var days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  for (var i = 0; i < pairingSuggestions.length; i++) {
    var s = pairingSuggestions[i];
    if (!s.pairing && !s.status) continue;
    if (s.status === 'no_plan_week') continue;
    var sd = new Date(s.date + 'T12:00:00');
    if (sd >= weekStart && sd <= weekEnd) {
      var dayName = days[sd.getDay()];
      results.push({ suggestion: s, dayName: dayName });
    }
  }
  return results;
}

function renderPairingsHtml(pairings) {
  if (!pairings || !pairings.length) return '';
  var html = '';
  for (var i = 0; i < pairings.length; i++) {
    var p = pairings[i];
    var s = p.suggestion;
    if (!s.pairing) continue;
    var score = s.pairing.score;
    var cls, icon, detail = '';
    var sb = s.suggested_bottle;
    if (sb) {
      cls = 'sommelier';
      var sbBadge = (sb.type || '').toLowerCase().replace('rosé','rose');
      if (sb.varietal && sb.varietal.toLowerCase().indexOf('sparkling') >= 0) sbBadge = 'sparkling';
      icon = wineIcon(sbBadge || 'red', 18);
      detail = 'The Sommelier suggests: ' + sb.vintage + ' ' + sb.wine;
      var meta = [];
      if (sb.window && sb.window !== '?–?') meta.push('Window <span>' + sb.window + '</span>');
      if (sb.score) meta.push('Score <span>CT' + Math.round(sb.score) + '</span>');
      if (meta.length) detail += '<div class="pairing-meta">' + meta.join(' &nbsp;&middot;&nbsp; ') + '</div>';
    } else if (score === 'good') {
      cls = 'good'; icon = wineIcon(s.planned_badge || 'red', 18); detail = 'planned wine pairs well';
    } else {
      cls = 'partial'; icon = '—'; detail = 'enjoy the planned wine';
    }
    html += '<div class="pairing-row ' + cls + '">' +
      '<span class="pairing-icon">' + icon + '</span>' +
      '<div><span class="pairing-meal">' + p.dayName + ': ' + s.meal + '</span>' +
      (detail ? '<div class="pairing-detail">' + detail + '</div>' : '') +
      '</div></div>';
  }
  return html;
}

function renderCalendar() {
  const cal = document.getElementById('calendar-view');
  cal.innerHTML = '';
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const byYear = {};
  allWeeks.forEach(function(w) {
    const d = new Date(w.date);
    const yr = d.getFullYear();
    const mo = d.getMonth();
    if (!byYear[yr]) byYear[yr] = {};
    if (!byYear[yr][mo]) byYear[yr][mo] = [];
    byYear[yr][mo].push(w);
  });
  Object.keys(byYear).sort().forEach(function(yr) {
    const yearBlock = document.createElement('div');
    const yh = document.createElement('div');
    yh.className = 'cal-year-header';
    const subText = yr == 2026 ? 'Year 1 begins' : yr == 2027 ? 'Year 1 ends · Year 2 begins' : 'Year 2 ends';
    yh.innerHTML = yr + ' <span class="cal-year-sub">' + subText + '</span>';
    yearBlock.appendChild(yh);
    const grid = document.createElement('div');
    grid.className = 'cal-grid';
    Object.keys(byYear[yr]).map(Number).sort(function(a,b){return a-b;}).forEach(function(mo) {
      const entries = byYear[yr][mo];
      const monthCard = document.createElement('div');
      monthCard.className = 'cal-month';
      const hdr = document.createElement('div');
      hdr.className = 'cal-month-header';
      hdr.innerHTML = '<span class="cal-month-name">' + monthNames[mo] + '</span><span class="cal-month-count">' + entries.length + ' bottle' + (entries.length > 1 ? 's' : '') + '</span>';
      monthCard.appendChild(hdr);
      const entriesDiv = document.createElement('div');
      entriesDiv.className = 'cal-entries';
      entries.forEach(function(w) {
        const pillClass = w.evolution ? 'evolution-pill' : w.urgent ? 'urgent-pill' : w.special ? 'special-pill' : '';
        const typeColor = typeColors[w.badge] || '#8b2035';
        const label = w.badge === 'rose' ? 'Rosé' : w.badge.charAt(0).toUpperCase() + w.badge.slice(1);
        const dayStr = w.date.split(',')[0];
        const flags = [];
        if (w.urgent)    flags.push('<span class="cal-flag urgent">⚠ Urgent</span>');
        if (w.evolution) flags.push('<span class="cal-flag evolution">◉ Evolution</span>');
        if (w.occasion)  flags.push('<span class="cal-flag occasion">' + occasionIcon(w.occasion) + ' ' + w.occasion + '</span>');
        else if (w.special && !w.evolution) flags.push('<span class="cal-flag special">◆ Special</span>');
        const entry = document.createElement('div');
        entry.className = 'cal-entry';
        entry.innerHTML = '<div class="cal-week-pill ' + pillClass + '">' + w.week + '</div>' +
          '<div class="cal-type-dot">' + wineIcon(w.badge, 14) + '</div>' +
          '<div class="cal-entry-body">' +
            '<div class="cal-entry-date">' + dayStr + ' &nbsp;·&nbsp; ' + label + '</div>' +
            '<div class="cal-entry-name"><span class="cal-entry-vintage">' + w.vintage + '</span> ' + w.name + '</div>' +
            '<div class="cal-entry-sub">' + w.appellation.split(' · ')[0] + '</div>' +
            (flags.length ? '<div class="cal-entry-flags">' + flags.join('') + '</div>' : '') +
          '</div>';
        var calPairings = getPairingsForWeek(w.date);
        calPairings.forEach(function(cp) {
          var pScore = cp.suggestion.pairing.score;
          var pColor = pScore === 'good' ? '#3b4f1e' : pScore === 'partial' ? '#623218' : '#572120';
          var pIcon = pScore === 'good' ? '✓' : pScore === 'partial' ? '~' : '✗';
          var mealSpan = document.createElement('div');
          mealSpan.className = 'cal-entry-sub';
          mealSpan.style.color = pColor;
          mealSpan.style.fontWeight = '600';
          var mealText = pIcon + ' ' + cp.dayName + ': ' + cp.suggestion.meal;
          if (cp.suggestion.suggested_bottle) {
            mealText += ' · Sommelier: ' + cp.suggestion.suggested_bottle.vintage + ' ' + cp.suggestion.suggested_bottle.wine;
          }
          mealSpan.textContent = mealText;
          entry.querySelector('.cal-entry-body').appendChild(mealSpan);
        });
        entriesDiv.appendChild(entry);
      });
      monthCard.appendChild(entriesDiv);
      grid.appendChild(monthCard);
    });
    yearBlock.appendChild(grid);
    cal.appendChild(yearBlock);
  });
}

function renderChangelog() {
  var view = document.getElementById('changelog-view');
  view.innerHTML = '';

  var history = changelogHistory || [];

  if (!history.length) {
    view.innerHTML = '<div class="changelog-header-card"><h2>What Changed</h2><p class="changelog-summary">No changes in the last 90 days.</p></div>';
    return;
  }

  // Header card
  var hc = document.createElement('div');
  hc.className = 'changelog-header-card';
  hc.innerHTML = '<h2>What Changed</h2><p class="changelog-summary">Rolling 90-day history of plan changes. Only syncs that produced changes are shown.</p>';
  view.appendChild(hc);

  // Table
  var table = document.createElement('table');
  table.className = 'changelog-table';
  table.innerHTML = '<thead><tr><th>Date</th><th>Added</th><th>Removed</th></tr></thead>';
  var tbody = document.createElement('tbody');

  history.forEach(function(entry) {
    var tr = document.createElement('tr');

    // Date cell
    var tdDate = document.createElement('td');
    tdDate.className = 'changelog-date-cell';
    tdDate.textContent = formatChangelogDate(entry.date);
    tr.appendChild(tdDate);

    tr.appendChild(renderChangeCell(entry.changes, 'added'));
    tr.appendChild(renderChangeCell(entry.changes, 'removed'));

    tbody.appendChild(tr);
  });

  table.appendChild(tbody);
  view.appendChild(table);
}

function renderChangeCell(changes, type) {
  var items = (changes || []).filter(function(c) { return c.type === type; });
  var td = document.createElement('td');
  if (items.length) {
    items.forEach(function(c) {
      var div = document.createElement('div');
      div.className = 'changelog-wine changelog-' + type;
      var pill = c.week != null ? '<span class="changelog-wine-pill">Wk ' + c.week + '</span>' : '';
      div.innerHTML = pill + escapeHtml(c.description);
      td.appendChild(div);
    });
  } else {
    td.className = 'changelog-empty';
    td.textContent = '\u2014';
  }
  return td;
}

function formatChangelogDate(isoDate) {
  if (!isoDate) return '';
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var parts = isoDate.split('-');
  if (parts.length !== 3) return isoDate;
  var m = parseInt(parts[1], 10) - 1;
  var d = parseInt(parts[2], 10);
  return months[m] + ' ' + d + ', ' + parts[0];
}

function escapeHtml(str) {
  var div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

let currentYear = 'y1';
let currentFilter = 'all';
var changelogHistory = [];

function getWeeks() {
  let w = allWeeks;
  if (currentYear === 'y1') w = w.filter(function(x){ return x.year === 1; });
  else if (currentYear === 'y2') w = w.filter(function(x){ return x.year === 2; });
  if (currentFilter === 'urgent')    w = w.filter(function(x){ return x.urgent; });
  if (currentFilter === 'special')   w = w.filter(function(x){ return x.special; });
  if (currentFilter === 'evolution') w = w.filter(function(x){ return x.evolution; });
  if (['sparkling','rose','white','red'].indexOf(currentFilter) >= 0) w = w.filter(function(x){ return x.badge === currentFilter; });
  if (['spring','summer','fall','winter'].indexOf(currentFilter) >= 0) w = w.filter(function(x){ return x.season === currentFilter; });
  return w;
}

function renderPlan() {
  const plan = document.getElementById('plan');
  plan.innerHTML = '';
  const filtered = getWeeks();
  const seasons = ['spring','summer','fall','winter'];
  const years = currentYear === 'all' ? [1,2] : currentYear === 'y1' ? [1] : [2];
  years.forEach(function(yr) {
    const yrKey = yr === 1 ? 'y1' : 'y2';
    seasons.forEach(function(season) {
      const sw = filtered.filter(function(w){ return w.year === yr && w.season === season; });
      if (!sw.length) return;
      const info = quarterInfo[season][yrKey];
      const section = document.createElement('section');
      section.className = 'quarter';
      section.innerHTML = '<div class="quarter-header">' +
        '<h2 class="quarter-title">' + info.title + '</h2>' +
        '<span class="quarter-sub">' + info.sub + '</span>' +
        '<span class="quarter-note">' + info.note + '</span>' +
        '</div><div class="weeks-grid" id="grid-' + yr + '-' + season + '"></div>';
      plan.appendChild(section);
      const grid = section.querySelector('#grid-' + yr + '-' + season);
      sw.forEach(function(w) {
        const cls = w.evolution ? 'evolution-card' : w.urgent ? 'urgent' : (w.special ? 'special' : '');
        const card = document.createElement('div');
        card.className = 'week-card' + (cls ? ' ' + cls : '');
        const label = w.badge === 'rose' ? 'Rosé' : w.badge.charAt(0).toUpperCase() + w.badge.slice(1);
        let html = '<div class="card-top"><span class="week-num">Week ' + w.week + '</span><span class="week-date">' + w.date + '</span></div>';
        html += '<div class="badge badge-' + w.badge + '">' + wineIcon(w.badge, 14) + label + '</div>';
        html += '<div class="wine-name"><span class="wine-vintage">' + w.vintage + '</span> ' + w.name + '</div>';
        html += '<div class="wine-appellation">' + w.appellation + '</div>';
        if (w.window || w.score) {
          html += '<div class="wine-meta">';
          if (w.window) html += '<div class="meta-item">Window <span>' + w.window + '</span></div>';
          if (w.score)  html += '<div class="meta-item">Score <span>' + w.score + '</span></div>';
          html += '</div>';
        }
        if (w.occasion)  html += '<div class="occasion-tag">' + occasionIcon(w.occasion) + ' ' + w.occasion + '</div>';
        if (w.urgent)    html += '<div class="urgent-flag">Drink now — urgent</div>';
        if (w.evolution) html += '<div class="evolution-flag">Evolution track</div>';
        html += '<div class="note-text">' + w.note + '</div>';
        var pairings = getPairingsForWeek(w.date);
        html += renderPairingsHtml(pairings);
        card.innerHTML = html;
        grid.appendChild(card);
      });
    });
  });
  if (!filtered.length) {
    plan.innerHTML = '<div class="empty-state">No bottles match this filter for the selected year.</div>';
  }
}

function switchYear(yr, btn) {
  currentYear = yr;
  document.querySelectorAll('.year-tab').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  const planView      = document.getElementById('plan-view');
  const calView       = document.getElementById('calendar-view');
  const changelogView = document.getElementById('changelog-view');
  const filterBar     = document.getElementById('filter-bar');
  planView.classList.add('hidden');
  calView.classList.remove('visible');
  changelogView.classList.remove('visible');
  filterBar.classList.add('hidden');
  if (yr === 'cal') {
    calView.classList.add('visible');
    renderCalendar();
  } else if (yr === 'changes') {
    changelogView.classList.add('visible');
    renderChangelog();
  } else {
    planView.classList.remove('hidden');
    filterBar.classList.remove('hidden');
    renderPlan();
  }
}

// Populate legend wine icons in filter buttons
function populateLegend() {
  document.getElementById('legend-sparkling').innerHTML = wineIcon('sparkling', 14) + ' Sparkling';
  document.getElementById('legend-rose').innerHTML = wineIcon('rose', 14) + ' Ros\u00e9';
  document.getElementById('legend-white').innerHTML = wineIcon('white', 14) + ' White';
  document.getElementById('legend-red').innerHTML = wineIcon('red', 14) + ' Red';
}

function applyFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  renderPlan();
}

// Load plan data and pairing suggestions in parallel, then render
Promise.all([
  fetch('plan.json').then(function(r) { return r.json(); }),
  fetch('pairing_suggestions.json').then(function(r) { return r.json(); }).catch(function() { return { suggestions: [] }; })
]).then(function(results) {
  var planData = results[0];
  allWeeks    = planData.allWeeks;
  quarterInfo = planData.quarterInfo;
  changelogHistory = planData.changelogHistory || [];
  pairingSuggestions = (results[1] && results[1].suggestions) || [];
  document.getElementById('stat-planned').textContent   = allWeeks.length;
  document.getElementById('stat-urgent').textContent    = allWeeks.filter(function(w){ return w.urgent === true; }).length;
  document.getElementById('stat-evolution').textContent = allWeeks.filter(function(w){ return w.evolution === true; }).length;
  document.getElementById('stat-pairings').textContent  = pairingSuggestions.filter(function(s){ return s.pairing; }).length;
  populateLegend();
  renderPlan();
}).catch(function(err) {
  document.getElementById('plan').innerHTML =
    '<div style="padding:48px;text-align:center;color:#8e8c84;">' +
    '<h2>Unable to load the wine plan</h2>' +
    '<p>Please try refreshing the page. (' + err.message + ')</p></div>';
});
</script>
</body>
</html>
